zotero:
  user_id: ??? # User ID of your Zotero account.
  api_key: ??? # An Zotero API key with read access.
  include_path: null # A list of glob patterns marking the Zotero collections that should be included. Example: ["2026/survey/**","2026/reading-group/**"]
  ignore_path: null # A list of glob patterns marking the Zotero collections that should be excluded. Example: ["2026/ignore/**","archive/**"]

source:
  arxiv:
    category: null # The categories of target arxiv papers. Find the abbr of your research area from [here](https://arxiv.org/category_taxonomy). Example: ["cs.AI","cs.CV","cs.LG","cs.CL"]
    include_cross_list: false # Whether to include arXiv cross-list papers in subscribed categories. Example: true
  biorxiv:
    category: null # The categories of target biorxiv papers. Find categories from [here](https://www.biorxiv.org/). Example: ["biochemistry","animal behavior and cognition"]
  medrxiv:
    category: null # The categories of target medrxiv papers. Find categories from [here](https://www.medrxiv.org/) Example: ["psychiatry and clinical psychology", "neurology"]
  openalex:
    # OpenAlex covers formally published journal/conference papers (not only preprints).
    filter_type: search # How to select works: "search" (keyword, easy to start) or "topic" (precise, by topics.id).
    search: null # A list of keyword queries used when filter_type=search. Results of every query are unioned. Example: ["speech health detection","voice disorder deep learning","pathological speech"]
    topic_ids: null # A list of OpenAlex topic ids used when filter_type=topic (OR-joined). Concepts are deprecated; use Topics. Example: ["T10863","T10860","T10201"]
    days: 2 # Look-back window in days for from_publication_date (keep close to the daily cron cadence). Example: 2
    source_types: null # Restrict to these OpenAlex source (venue) types, dropping repository/preprint hosts. null = no restriction. Example: ["journal","conference"]
    max_results: 200 # Cap on candidate works fetched (bounds runtime and LLM cost). Example: 200
    mailto: null # Your email, to use the OpenAlex "polite pool" (faster, more reliable). Example: you@example.com

llm:
  api:
    key: ??? # API Key of your LLM API. Example: sk-xxx
    base_url: ??? # API URL of your LLM API. Example: https://api.openai.com/v1
  generation_kwargs:
  # Arguments for the LLM API. See [here](https://platform.openai.com/docs/api-reference/chat/create) for more details.
    max_tokens: 16384
    model: ???
  language: English # Preferred language for the TL;DR. Example: English
  max_requests_per_minute: null # Pace LLM calls to respect a free-tier rate limit. Gemini free tier is ~5. null = no pacing. Example: 5
  max_retries: 5 # How many times the LLM client retries on transient errors (e.g. 429). Example: 5

reranker:
  local:
    model: jinaai/jina-embeddings-v5-text-nano-retrieval # The Hugging Face model name of the local embedding model. Example: jinaai/jina-embeddings-v5-text-nano
    encode_kwargs:
    # The kwargs for the encode method of the local embedding model. Details see [here](https://www.sbert.net/docs/package_reference/SentenceTransformer.html#sentence_transformers.SentenceTransformer.encode)
      task: retrieval
      prompt_name: document
  api:
    key: null # API Key of your embedding model API. Example: sk-xxx
    base_url: null # API URL of your embedding model API. Example: https://api.openai.com/v1
    model: null # The model name of the embedding model. Example: text-embedding-3-large
    batch_size: null # The batch size for embedding API requests. Adjust to match your provider's limit. Example: 64

rss:
  output_path: public/feed.xml # Where the generated RSS file is written. The workflow publishes this folder to GitHub Pages.
  title: Zotero-arXiv-Daily # The <title> of the RSS channel.
  link: ??? # The public URL of your GitHub Pages site. Example: https://<username>.github.io/zotero-arxiv-daily
  description: Daily paper recommendations based on your Zotero library. # The <description> of the RSS channel.
  language: en # The <language> of the RSS channel. Example: en, zh-cn
  self_link: null # The absolute URL of feed.xml (atom:self). Defaults to "<link>/feed.xml" when null.
  stylesheet: rss.xsl # Optional XSLT stylesheet published next to feed.xml so browsers render the raw XML nicely. Set null to disable.
  image_url: null # Channel logo shown by RSS readers. Defaults to "<link>/feed-icon.png" (published by the workflow) when null. Set "" to omit.

executor:
  debug: false # Whether to use debug mode. Example: true
  max_paper_num: 50 # The maximum number of the papers presented in the feed. Example: 50
  source: ??? # The sources of papers to retrieve. Example: ['arxiv','openalex','biorxiv','medrxiv']
  reranker: local # The reranker to use. Example: 'local' or 'api'
