zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

llm:
  api:
    key: ${oc.env:GEMINI_API_KEY}
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/ # Gemini's OpenAI-compatible endpoint
  generation_kwargs:
    model: gemini-2.5-flash

source:
  arxiv:
    # Speech / audio-based deep-learning health detection.
    category: ["eess.AS","cs.SD","cs.LG","eess.SP"]
    include_cross_list: false # Set true to also include cross-listed papers in these categories.
  openalex:
    filter_type: search # "search" = keyword mode (start here). Switch to "topic" after confirming topic_ids below.
    search:
      - "speech health detection"
      - "voice disorder deep learning"
      - "pathological speech"
      - "acoustic biomarker disease detection"
      - "audio based disease detection"
    # Precise mode candidates (see DEPLOYMENT.md). Set filter_type: topic to use these:
    topic_ids: ["T10863","T10860","T10201"] # Voice&Speech Disorders / Speech&Audio Processing / Speech Recognition&Synthesis
    days: 2
    max_results: 200
    mailto: ${oc.env:OPENALEX_MAILTO,null} # Optional: your email for the OpenAlex polite pool.

rss:
  link: https://pinecho.github.io/zotero-arxiv-daily # Your GitHub Pages URL.
  description: Daily speech/audio health-detection papers ranked against my Zotero library.

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv','openalex']
