name: Build RSS feed daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

# Permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Build RSS feed
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENALEX_MAILTO: ${{ vars.OPENALEX_MAILTO }}
        run: |
          uv run src/zotero_arxiv_daily/main.py
          # Publish the XSLT + feed icon next to feed.xml (browser rendering + reader logo).
          cp assets/rss.xsl public/rss.xsl
          cp assets/feed-icon.png public/feed-icon.png
          echo "Generated feed:"
          head -n 20 public/feed.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
