name: Test
on:
  workflow_dispatch:

# Debug run: builds the feed in DEBUG mode (few papers) and uploads it as an
# artifact for inspection. It does NOT deploy to GitHub Pages.
jobs:
  build-debug-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4

      - name: Run script (debug)
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENALEX_MAILTO: ${{ vars.OPENALEX_MAILTO }}
        run: |
          export DEBUG=true
          uv run src/zotero_arxiv_daily/main.py
          echo "Generated feed:"
          cat public/feed.xml

      - name: Upload feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed
          path: public/feed.xml
